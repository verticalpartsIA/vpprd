<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="VP Gestão — Plataforma de gestão de importação, engenharia e comercial da VerticalParts. Cotações, propostas, NCM, embarques e logística em um só lugar.">
  <meta name="robots" content="noindex, nofollow">
  <title>VP Gestão · VerticalParts</title>

  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="styles/app.css?v=2">
  <link rel="stylesheet" href="styles/modules.css">
  <link rel="stylesheet" href="styles/proposta-editor.css">
  <link rel="stylesheet" href="styles/ncm.css">
  <link rel="stylesheet" href="styles/desenho-tecnico.css?v=1">
  <link rel="stylesheet" href="styles/contrato-instalador.css?v=1">
  <link rel="stylesheet" href="styles/contrato-venda.css?v=1">
  <link rel="stylesheet" href="styles/ficha-tecnica.css?v=5">
  <link rel="stylesheet" href="styles/vp-copiloto.css?v=1">
  <link rel="stylesheet" href="styles/pedido-fornecedor.css?v=3">
  <link rel="stylesheet" href="styles/ficha-workflow.css?v=1">
  <link rel="stylesheet" href="styles/logs-admin.css?v=1">

  <!-- React + Babel pinned versions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Supabase JS client (CDN, sem build step) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- jsPDF + html2canvas — Ficha Técnica salva PDF direto.
       Bibliotecas separadas (não bundle) pra ter controle total: pegamos
       o canvas e adicionamos como 1 imagem num PDF A4 — 1 página garantida. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="vp" data-density="cozy">
  <div id="root"></div>
  <div id="vp-boot" style="
    position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;z-index:9999;font-family:sans-serif;">
    <img src="assets/logo-mark-yellow.png" alt="" style="width:48px;opacity:.9"/>
    <div style="font-size:13px;font-weight:700;letter-spacing:.08em;color:#111;">VP GESTÃO</div>
    <div style="width:32px;height:32px;border:3px solid #f0f0f0;border-top-color:#f5c400;
      border-radius:50%;animation:vp-spin .7s linear infinite;"></div>
    <div style="font-size:11px;color:#999;letter-spacing:.05em;">Carregando…</div>
  </div>
  <style>@keyframes vp-spin{to{transform:rotate(360deg)}}</style>

  <!-- Utilitários globais sem dados de demonstração -->
  <script src="src/utils.js?v=1"></script>
  <script src="src/ncm-data.js?v=7"></script>

  <!-- Supabase loader + carregador de dados reais -->
  <script src="src/supabase.js?v=10"></script>

  <!-- Registro central de atividades (auditoria global) -->
  <script src="src/vp-log.js?v=2"></script>

  <!-- Tweaks panel framework -->
  <script type="text/babel" src="src/tweaks-panel.jsx?v=3"></script>

  <!-- Components in dependency order -->
  <script type="text/babel" src="src/primitives.jsx?v=3"></script>
  <script type="text/babel" src="src/toast.jsx?v=3"></script>
  <script type="text/babel" src="src/shell.jsx?v=16"></script>
  <script type="text/babel" src="src/dashboard.jsx?v=8"></script>
  <script type="text/babel" src="src/comercial.jsx?v=12"></script>
  <script type="text/babel" src="src/precificacao.jsx?v=7"></script>
  <script type="text/babel" src="src/proposta-form.jsx?v=7"></script>
  <script type="text/babel" src="src/proposta-preview.jsx?v=5"></script>
  <script type="text/babel" src="src/proposta-editor.jsx?v=9"></script>
  <script type="text/babel" src="src/ncm.jsx?v=5"></script>

  <!-- Funil de pré-venda por setores (workflow + histórico) — antes do Catálogo -->
  <script src="src/ficha-workflow-engine.js?v=1"></script>
  <script src="src/ficha-workflow-store.js?v=3"></script>
  <script type="text/babel" src="src/ficha-workflow.jsx?v=1"></script>

  <script type="text/babel" src="src/ncm-catalogo.jsx?v=19"></script>
  <script type="text/babel" src="src/operacoes.jsx?v=11"></script>
  <script type="text/babel" src="src/logistica.jsx?v=13"></script>
  <script type="text/babel" src="src/financeiro.jsx?v=9"></script>

  <!-- Etapas finais do workflow (ART, Cronograma, Data Book) -->
  <script type="text/babel" src="src/entrega.jsx?v=2"></script>

  <!-- Jurídico · Editor de Contrato do Cliente -->
  <script type="text/babel" src="src/contrato-editor.jsx?v=5"></script>

  <!-- Engenharia · Configurador de Equipamentos -->
  <script type="text/babel" src="src/engenharia-config.jsx?v=2"></script>

  <!-- Engenharia · Desenho Técnico ER|ES (porte Claude Designer) -->
  <script type="text/babel" src="src/desenho-tecnico.jsx?v=1"></script>

  <!-- Jurídico · Contrato Instalador (wizard + dashboard + assinatura digital) -->
  <script src="src/contrato-instalador-engine.js?v=1"></script>
  <script src="src/contrato-instalador-store.js?v=2"></script>
  <script type="text/babel" src="src/contrato-instalador-preview.jsx?v=1"></script>
  <script type="text/babel" src="src/contrato-instalador.jsx?v=2"></script>

  <!-- Jurídico · Contrato Venda de Equipamentos (cliente final) -->
  <script src="src/contrato-venda-engine.js?v=1"></script>
  <script src="src/contrato-venda-store.js?v=2"></script>
  <script type="text/babel" src="src/contrato-venda-preview.jsx?v=1"></script>
  <script type="text/babel" src="src/contrato-venda.jsx?v=2"></script>

  <!-- Engenharia · Ficha Técnica (gerador universal) -->
  <script src="src/ficha-tecnica-engine.js?v=8"></script>
  <script src="src/ficha-tecnica-store.js?v=3"></script>
  <script src="src/ficha-tecnica-imagens.js?v=1"></script>
  <script src="src/ficha-omie-publish.js?v=5"></script>
  <script type="text/babel" src="src/ficha-tecnica.jsx?v=15"></script>
  <script type="text/babel" src="src/ficha-tecnica-copiloto.jsx?v=2"></script>

  <!-- Catálogo · Pedido a Fornecedor (RFQ bilíngue PT|EN) -->
  <script src="src/pedido-fornecedor-engine.js?v=3"></script>
  <script src="src/pedido-fornecedor-store.js?v=3"></script>
  <script type="text/babel" src="src/pedido-fornecedor.jsx?v=3"></script>

  <!-- Copiloto VP · bolinha global (chat + preenchimento + revisão) -->
  <!-- Admin: Logs de Atividade -->
  <script type="text/babel" src="src/logs-admin.jsx?v=1"></script>

  <script type="text/babel" src="src/vp-copiloto.jsx?v=1"></script>

  <!-- Main app last -->
  <script type="text/babel" src="src/app.jsx?v=20"></script>
</body>
</html>
